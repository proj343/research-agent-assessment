name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── CI: lint + test ────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Test
        run: uv run pytest -n auto --tb=short -q

  # ── CD: build → push → deploy (main branch only) ──────────────────────────
  #
  # Prerequisites (one-time setup):
  #   1. Run `make secrets` and `make deploy` locally to bootstrap GCP infra.
  #   2. Create a Workload Identity Federation pool and provider for GitHub:
  #        https://cloud.google.com/iam/docs/workload-identity-federation-with-deployment-pipelines#github
  #   3. Grant the service account roles/run.developer and
  #        roles/artifactregistry.writer on the project.
  #   4. Add two repository variables in GitHub → Settings → Variables:
  #        GCP_WORKLOAD_IDENTITY_PROVIDER  (full provider resource name)
  #        GCP_SERVICE_ACCOUNT             (SA email used by Cloud Run deploy)
  #
  # Terraform is NOT run here because state is local. Re-run `make deploy`
  # manually for infrastructure changes; this job only updates the running image.
  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    env:
      PROJECT_ID: research-agent-assessment
      REGION: us-central1
      SERVICE: research-agent
      IMAGE: us-central1-docker.pkg.dev/research-agent-assessment/research-agent/api

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --quiet

      - name: Print service URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --format "value(status.url)"
